name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches: [ "main" ]   # Push to main = latest tag
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"      # 권장: 순수 SemVer (2.0.22)
      - "[0-9]+.[0-9]+.[0-9]+-*"
      - "v[0-9]+.[0-9]+.[0-9]+"     # 호환: v 접두사 (v2.0.21 등 기존 태그)
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "수동 빌드할 태그 (예: 2.0.24). 비우면 main 브랜치 빌드."
        required: false

# 동일 ref 에 대한 중복 빌드 방지: 새 push 가 들어오면 진행 중이던 빌드는
# 취소. 빠른 연속 commit 시 5 개 빌드가 동시에 Docker Hub 를 두드려서
# rate limit (429) 에 걸리던 문제 차단.
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/oc-proxy-downloader

jobs:
  # 공통 메타데이터 생성
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate version
      id: version
      run: |
        DISPATCH_TAG="${{ github.event.inputs.tag }}"
        if [[ -n "$DISPATCH_TAG" ]]; then
          VERSION="${DISPATCH_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          DATE=$(date +'%Y.%m.%d')
          SHORT_SHA=${GITHUB_SHA::7}
          VERSION="${DATE}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi
        echo "Generated version: ${VERSION}"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
        flavor: |
          latest=auto

  # PR용 빠른 AMD64 빌드 (push 안 함)
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (AMD64 only for PR)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: false
        tags: ${{ needs.prepare.outputs.tags }}
        labels: ${{ needs.prepare.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          VERSION=${{ needs.prepare.outputs.version }}

  # 단일 multi-platform 빌드.
  # - 이전 구조: AMD64 push → ARM64 push → ``docker buildx imagetools create``
  #   로 머지 (매 빌드마다 6+ pull → 429 rate limit 빈발)
  # - 현재 구조: ``platforms: linux/amd64,linux/arm64`` 한 번에 빌드 후 push.
  #   buildx 가 push 시점에 multi-platform manifest 를 native 로 만들어
  #   별도 머지 단계 / Docker Hub pull 불필요.
  build-multiplatform:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 순서 중요: login → qemu → buildx 가 되어야 buildx daemon 이
    # 자격증명을 인계받아 Docker Hub anonymous rate limit (429) 을 피할 수 있다.
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push multi-platform image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ needs.prepare.outputs.tags }}
        labels: ${{ needs.prepare.outputs.labels }}
        cache-from: |
          type=gha
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: |
          type=gha,mode=max
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          VERSION=${{ needs.prepare.outputs.version }}

    - name: Build summary
      run: |
        echo "🐳 Multi-Platform Build Complete!"
        echo "================================="
        echo "✅ Single buildx pass — AMD64 + ARM64 manifest pushed atomically."
        echo "Version: ${{ needs.prepare.outputs.version }}"
        echo "Is Release: ${{ needs.prepare.outputs.is_release }}"
        echo ""
        echo "Tags published:"
        echo "${{ needs.prepare.outputs.tags }}" | sed 's/^/  - /'
        echo "================================="
