name: Build ARM64 (Slow)

# ARM64 빌드는 수동 또는 태그 릴리스 시에만
on:
  push:
    tags: [ "v*" ]  # 릴리스 태그에만 자동 실행
  workflow_dispatch:  # 수동 실행 가능

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/oc-proxy-downloader

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate version
      id: version
      run: |
        if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          DATE=$(date +'%Y.%m.%d')
          SHORT_SHA=${GITHUB_SHA::7}
          VERSION="${DATE}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi
        echo "Generated version: ${VERSION}"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}},suffix=-arm64
          type=raw,value=arm64-latest
          type=raw,value=arm64-${{ steps.version.outputs.version }}

    - name: Build and push ARM64
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: |
          type=gha,scope=arm64
          type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-latest
        cache-to: type=gha,mode=max,scope=arm64
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          VERSION=${{ steps.version.outputs.version }}
        provenance: false
        sbom: false

    - name: Build summary
      run: |
        echo "🏗️ ARM64 Build Complete!"
        echo "========================"
        echo "Version: ${{ steps.version.outputs.version }}"
        echo "Platform: linux/arm64"
        echo "Tags built:"
        echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
        echo "Build time: ~15-20 minutes"
        echo "========================"