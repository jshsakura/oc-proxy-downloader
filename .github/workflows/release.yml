name: Release (Windows EXE + GitHub Release)

on:
  push:
    tags:
      # 순수 SemVer 형식 (권장): 2.0.22, 10.1.0
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
      # 기존 호환: v2.0.21 같은 prefix 형식
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "기존 태그를 다시 빌드/릴리스 (예: 2.0.22 또는 v2.0.22)"
        required: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 공통 메타데이터 (버전, 릴리스 노트용 베이스)
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      # tag_name: 실제 git 태그 이름 (예: 2.0.22 또는 v2.0.22 — 푸시한 그대로 사용)
      tag_name: ${{ steps.version.outputs.tag_name }}
      # version_no_v: v prefix 를 항상 제거한 순수 버전 (예: 2.0.22) — Docker 태그/파일명 등에 사용
      version_no_v: ${{ steps.version.outputs.version_no_v }}
      tag_ref: ${{ steps.version.outputs.tag_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_REF="${GITHUB_REF}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
            TAG_REF="refs/tags/${TAG_NAME}"
          else
            echo "::error::tag 입력이 없고 push 이벤트도 아닙니다."
            exit 1
          fi

          # 사용자가 v 를 붙였든 안 붙였든 항상 v 제거한 형식을 별도로 보관
          VERSION_NO_V="${TAG_NAME#v}"

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"
          echo "tag_ref=${TAG_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG_NAME} (semver=${VERSION_NO_V})"

  # ---------------------------------------------------------------------------
  # Windows EXE 빌드 (PyInstaller)
  # ---------------------------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build frontend
        working-directory: frontend
        shell: pwsh
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Run backend tests (smoke)
        working-directory: backend
        shell: pwsh
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -q

      - name: Build EXE with PyInstaller
        working-directory: standalone
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm oc-proxy-downloader.spec

      - name: Verify EXE
        working-directory: standalone/dist
        shell: pwsh
        run: |
          if (-not (Test-Path "oc-proxy-downloader.exe")) {
            Write-Error "EXE not produced!"
            exit 1
          }
          Get-Item oc-proxy-downloader.exe | Select-Object Name, Length, LastWriteTime

      - name: Rename EXE with version
        working-directory: standalone/dist
        shell: pwsh
        run: |
          $newName = "oc-proxy-downloader-${{ needs.prepare.outputs.version_no_v }}-win-x64.exe"
          Rename-Item -Path "oc-proxy-downloader.exe" -NewName $newName
          Write-Host "Renamed to $newName"

      - name: Compute checksum
        working-directory: standalone/dist
        shell: pwsh
        run: |
          $exe = Get-ChildItem "*.exe" | Select-Object -First 1
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          "$hash *$($exe.Name)" | Out-File -Encoding ascii "$($exe.Name).sha256"
          Get-Content "$($exe.Name).sha256"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-proxy-downloader-windows
          path: |
            standalone/dist/*.exe
            standalone/dist/*.sha256
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) 빌드
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    needs: prepare
    runs-on: macos-14   # Apple Silicon (arm64) 러너
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Run backend tests (smoke)
        working-directory: backend
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -q

      - name: Build macOS binary with PyInstaller
        working-directory: standalone
        run: |
          python -m PyInstaller --clean --noconfirm oc-proxy-downloader.spec

      - name: Verify and rename binary
        working-directory: standalone/dist
        run: |
          if [ ! -f "oc-proxy-downloader" ]; then
            echo "::error::macOS binary not produced"
            ls -la
            exit 1
          fi
          chmod +x oc-proxy-downloader
          file oc-proxy-downloader
          NEW_NAME="oc-proxy-downloader-${{ needs.prepare.outputs.version_no_v }}-macos-arm64"
          mv oc-proxy-downloader "${NEW_NAME}"
          # Gatekeeper 주의: zip 으로 묶어 실행 권한 보존
          zip -j "${NEW_NAME}.zip" "${NEW_NAME}"
          # SHA256
          shasum -a 256 "${NEW_NAME}.zip" | tee "${NEW_NAME}.zip.sha256"
          ls -la

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-proxy-downloader-macos-arm64
          path: |
            standalone/dist/*.zip
            standalone/dist/*.sha256
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # GitHub Release 생성 + 산출물 첨부
  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, build-windows, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag_ref }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: oc-proxy-downloader-windows
          path: ./artifacts

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: oc-proxy-downloader-macos-arm64
          path: ./artifacts

      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          VERSION_NO_V="${{ needs.prepare.outputs.version_no_v }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG_NAME}")
            COMPARE_LINE="**Changes since \`${PREV_TAG}\`:**"
          else
            CHANGES=$(git log --pretty=format:'- %s (%h)' -20 "${TAG_NAME}")
            COMPARE_LINE="**Recent changes:**"
          fi

          {
            echo "notes<<__EOF__"
            echo "## OC Proxy Downloader ${VERSION_NO_V}"
            echo
            echo "### Downloads"
            echo "- 🪟 **Windows (x64)**: \`oc-proxy-downloader-${VERSION_NO_V}-win-x64.exe\` (첨부 파일 참고)"
            echo "- 🍎 **macOS (Apple Silicon, arm64)**: \`oc-proxy-downloader-${VERSION_NO_V}-macos-arm64.zip\`"
            echo "  > 처음 실행 시 Gatekeeper 가 차단할 수 있습니다."
            echo "  > 터미널에서 \`xattr -d com.apple.quarantine oc-proxy-downloader-${VERSION_NO_V}-macos-arm64\` 실행 후 사용하세요."
            echo "- 🐳 **Docker**: \`docker pull ${{ github.repository_owner }}/oc-proxy-downloader:${VERSION_NO_V}\`"
            echo
            echo "${COMPARE_LINE}"
            echo
            echo "${CHANGES}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.version_no_v }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            artifacts/*.exe
            artifacts/*.zip
            artifacts/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
